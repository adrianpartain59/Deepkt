# SoundDNA Feature Configuration
# ================================
# This defines the "DNA Recipe" — which audio features are extracted and
# which are included in the search index.
#
# We now use LAION-CLAP neural network embeddings.
# This produces a single 512-dimensional semantic vector.
# Weighting is handled implicitly by the neural network during extraction.
#
# Increment `version` when changing which features are enabled.

version: 5

features:
  clap_embedding:
    enabled: true
    weight: 1.0
    dimensions: 512
    description: "LAION-CLAP 512-d Semantic Audio Embedding"
