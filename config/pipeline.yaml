# Pipeline configuration — worker counts, rate limiting, and behavior

download:
  workers: 16             # Concurrent download threads
  rate_limit_pause: 0.5   # Seconds pause between downloads per thread
  max_retries: 3          # Retry failed downloads

analysis:
  workers: 2              # Constrain to 2 to prevent PyTorch MPS Out-Of-Memory system freezes
  timeout: 120            # Max seconds per track before timeout

indexing:
  batch_size: 100         # SQLite batch insert size

cleanup:
  delete_mp3_after: true  # Delete MP3 immediately after feature extraction
  temp_dir: data/tmp      # Temporary download directory during pipeline runs

progress:
  show_bar: true          # Rich progress bars
  log_file: data/pipeline.log

discovery:
  similarity_threshold: 0.95   # Min avg cosine similarity to pass gate
  probe_count: 3               # Tracks to analyze per candidate artist
  target_tracks: 5000          # Stop after this many tracks added to crawled_links.txt
  rate_limit_pause: 1.0        # Pause between API calls
  playlists_per_keyword: 20    # Max playlists to fetch per keyword search

